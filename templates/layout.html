<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK Vocab</title>
  <!-- Add favicon -->
  <link rel="shortcut icon" href="/static/images/favicon.png">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Include Bootstrap Select CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta3/css/bootstrap-select.min.css">



  <!-- Link to custom CSS -->
  <link rel="stylesheet" href="../static/styles.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      {% if session.get('user_id') %}
      <a class="navbar-brand" href="/user_home">HSK Vocab</a>
      {% else %}
      <a class="navbar-brand" href="/">HSK Vocab</a>
      {% endif %}
      </button>
        <div class="navbar-nav">
          {% if session.get('user_id') %}
          <a class = "nav-link" href="/start_quiz">Quiz</a>
          <a class = "nav-link" href = "/progress">Progress</a>
          <a class="nav-link" href="/logout">Log out</a>
          {% else %}
          <a class="nav-link" href="/sign_up">Register now</a>
          <a class="nav-link" href="/sign_in">Log in</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>
  {% block main %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
