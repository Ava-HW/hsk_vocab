{% extends "layout.html" %}

{% block main %}

<div class = "justify-content-center centered align-items-center">
  <h1>Sign up</h1>
  <form action = "/sign_up" method = "POST" class = "form-group">
    <div class="justify-content-center form-field">
      <label for="exampleInputEmail1">Email address</label>
      <input name = "email" type="email" class="form-control" aria-describedby="emailHelp" placeholder="Enter email">
    </div>
    <div class = "form-field">
      <label for="exampleInputPassword1">Password</label>
      <input name = "password" type="password" class="form-control" placeholder="Password">
    </div>
    <div class = "form-field">
      <label for="exampleInputPassword1">Name</label>
      <input name = "name" type="text" class="form-control" placeholder="Name">
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>


{% endblock %}
